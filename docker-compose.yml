services:
  postgres:
    image: postgres:16-alpine
    container_name: quad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quad
      POSTGRES_PASSWORD: quadpass
      POSTGRES_DB: quad
    ports:
      - "5432:5432"
    volumes:
      - quad_pg_data:/var/lib/postgresql/data

volumes:
  quad_pg_data:
